name: Daily raw metrics update

# Runs every day at 07:00 UTC — updates ONLY response volume, ratings,
# and NSAT. No NLP models involved, so this installs and runs fast even
# though it fires daily. Full classification/sentiment/entities run
# separately on their own weekly schedule (see weekly_pipeline.yml).
on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-raw-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lightweight dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-daily.txt

      - name: Update raw metrics
        env:
          SURVEYMONKEY_ACCESS_TOKEN: ${{ secrets.SURVEYMONKEY_ACCESS_TOKEN }}
          SURVEYMONKEY_SURVEY_ID: ${{ secrets.SURVEYMONKEY_SURVEY_ID }}
        run: python update_raw_metrics.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --quiet --cached || git commit -m "Daily raw metrics update — $(date -u +%Y-%m-%d)"
          git push