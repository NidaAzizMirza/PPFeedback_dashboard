name: Weekly full pipeline

# Runs every Monday at 07:00 UTC — the full pipeline: classification,
# ABSA sentiment, entity extraction, and dashboard tag/feature/error
# tables. This is the heavy job (loads SVM, sentence-transformer, ABSA,
# and spaCy models), which is why it's weekly rather than daily.
# Raw volume/rating/NSAT numbers are updated separately, daily, by
# daily_pipeline.yml — this workflow does not touch those.
on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-full-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm

      - name: Run full pipeline
        env:
          SURVEYMONKEY_ACCESS_TOKEN: ${{ secrets.SURVEYMONKEY_ACCESS_TOKEN }}
          SURVEYMONKEY_SURVEY_ID: ${{ secrets.SURVEYMONKEY_SURVEY_ID }}
        run: python run_pipeline.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ outputs/
          git diff --quiet --cached || git commit -m "Weekly full pipeline run — $(date -u +%Y-%m-%d)"
          git push